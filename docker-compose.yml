services:
  db:
    image: postgres:16-alpine
    container_name: rozga-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rozga
    ports:
      - "5432:5432"
    volumes:
      - rozga_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rozga"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  rozga_pg_data: